name: Deploy Report Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-success-sim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show commit info
        run: |
          echo "Simulating deploy success for report bot"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF_NAME"
          echo "SHA: $GITHUB_SHA"
          git log -1 --pretty=oneline

      - name: Fake deploy done
        run: echo "Deploy success signal emitted"
